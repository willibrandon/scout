name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

jobs:
  portable-build:
    name: portable build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
          - rid: osx-x64
            runner: macos-13
          - rid: osx-arm64
            runner: macos-15
          - rid: win-x64
            runner: windows-2025
          - rid: win-arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.102
      - name: Restore
        run: dotnet restore Scout.slnx
      - name: Build
        run: dotnet build Scout.slnx --no-restore
      - name: Format
        run: dotnet format Scout.slnx --no-restore --verify-no-changes
      - name: Publish Native AOT static library
        shell: pwsh
        run: >
          dotnet publish src/Scout.App/Scout.App.csproj
          -r ${{ matrix.rid }}
          -c Release
          -p:NativeLib=Static
          -p:PublishAot=true
          -o artifacts/app/${{ matrix.rid }}

  full-tests:
    name: full pinned tests
    runs-on:
      - self-hosted
      - scout
      - osx-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.102
      - name: Restore
        run: dotnet restore Scout.slnx
      - name: Test
        run: dotnet test Scout.slnx --no-restore
      - name: Preflight
        run: eng/preflight.sh

  native-unix:
    name: native Unix link (${{ matrix.rid }})
    runs-on:
      - self-hosted
      - scout
      - ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        rid:
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.102
      - name: Link native executable
        run: native/build-app-unix.sh ${{ matrix.rid }}

  performance-gate:
    name: hyperfine performance gate
    runs-on:
      - self-hosted
      - scout
      - osx-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.102
      - name: Link native executable
        run: native/build-app-unix.sh osx-arm64
      - name: Run hyperfine gates
        run: bench/run-hyperfine.sh --gate
