name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  LINUX_LIBC_VERSION: "2.36-9+deb12u14"
  LINUX_SNAPSHOT_URL: "http://snapshot.debian.org/archive/debian/20260531T000000Z"

jobs:
  portable-build-linux:
    name: portable build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    container:
      image: docker.io/library/debian:bookworm-slim@sha256:0104b334637a5f19aa9c983a91b54c89887c0984081f2068983107a6f6c21eeb
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
    steps:
      - name: Pinned snapshot apt prerequisites
        shell: sh
        run: |
          export DEBIAN_FRONTEND=noninteractive
          rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          printf 'deb %s bookworm main\n' "$LINUX_SNAPSHOT_URL" > /etc/apt/sources.list
          printf 'Acquire::Check-Valid-Until false;\nAcquire::Retries 3;\n' > /etc/apt/apt.conf.d/99snapshot
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            bzip2 \
            brotli \
            ca-certificates \
            clang \
            curl \
            git \
            gzip \
            libc6="$LINUX_LIBC_VERSION" \
            libc-bin="$LINUX_LIBC_VERSION" \
            libgssapi-krb5-2 \
            libicu72 \
            libssl3 \
            lz4 \
            ncompress \
            python3 \
            tar \
            unzip \
            xz-utils \
            zlib1g \
            zstd
      - uses: actions/checkout@v6
      - name: Verify Linux prerequisites
        shell: sh
        run: eng/verify-linux-prereqs.sh ${{ matrix.rid }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Restore
        run: dotnet restore Scout.slnx
      - name: MSBuild warning gates
        shell: bash
        run: eng/check-msbuild-warning-gates.sh
      - name: Build
        run: dotnet build Scout.slnx --no-restore
      - name: Portable tests
        run: |
          dotnet test tests/Scout.Regex.Tests/Scout.Regex.Tests.csproj --no-restore
          dotnet test tests/Scout.Foundation.Tests/Scout.Foundation.Tests.csproj --no-restore --filter "FullyQualifiedName!~ScoutApplicationTests&FullyQualifiedName!~ScoutApplicationRuntimeTests&FullyQualifiedName!~PinnedConfigurationTests"
          dotnet test tests/Scout.Differential.Tests/Scout.Differential.Tests.csproj --no-restore --filter "FullyQualifiedName~DifferentialCasePolicyTests|FullyQualifiedName~DifferentialOutputNormalizerTests"
      - name: Fuzz smoke
        shell: bash
        run: |
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- regex-parse
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- glob-compile
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- search-loop
      - name: Format
        run: dotnet format Scout.slnx --no-restore --verify-no-changes
      - name: Publish Native AOT static library
        shell: bash
        run: >
          dotnet publish src/Scout.App/Scout.App.csproj
          -r ${{ matrix.rid }}
          -c Release
          -p:NativeLib=Static
          -o artifacts/app/${{ matrix.rid }}

  linux-arm64-host:
    name: Linux ARM hosted gates
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux host prerequisites
        shell: sh
        run: eng/install-linux-host-prereqs.sh
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Restore
        run: dotnet restore Scout.slnx
      - name: MSBuild warning gates
        shell: bash
        run: eng/check-msbuild-warning-gates.sh
      - name: Build
        run: dotnet build Scout.slnx --no-restore
      - name: Portable tests
        run: |
          dotnet test tests/Scout.Regex.Tests/Scout.Regex.Tests.csproj --no-restore
          dotnet test tests/Scout.Foundation.Tests/Scout.Foundation.Tests.csproj --no-restore --filter "FullyQualifiedName!~ScoutApplicationTests&FullyQualifiedName!~ScoutApplicationRuntimeTests&FullyQualifiedName!~PinnedConfigurationTests"
          dotnet test tests/Scout.Differential.Tests/Scout.Differential.Tests.csproj --no-restore --filter "FullyQualifiedName~DifferentialCasePolicyTests|FullyQualifiedName~DifferentialOutputNormalizerTests"
      - name: Fuzz smoke
        shell: bash
        run: |
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- regex-parse
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- glob-compile
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- search-loop
      - name: Format
        run: dotnet format Scout.slnx --no-restore --verify-no-changes
      - name: Publish Native AOT static library
        shell: bash
        run: >
          dotnet publish src/Scout.App/Scout.App.csproj
          -r linux-arm64
          -c Release
          -p:NativeLib=Static
          -o artifacts/app/linux-arm64
      - name: Link native entry spike
        run: spike/build-unix.sh linux-arm64
      - name: Link native executable
        run: native/build-app-unix.sh linux-arm64 --smoke-only

  portable-build-host:
    name: portable build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-x64
            runner: macos-26-intel
          - rid: osx-arm64
            runner: macos-26
          - rid: win-x64
            runner: windows-2025-vs2026
          - rid: win-arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Restore
        run: dotnet restore Scout.slnx
      - name: MSBuild warning gates
        shell: bash
        run: eng/check-msbuild-warning-gates.sh
      - name: Build
        run: dotnet build Scout.slnx --no-restore
      - name: Portable tests
        run: |
          dotnet test tests/Scout.Regex.Tests/Scout.Regex.Tests.csproj --no-restore
          dotnet test tests/Scout.Foundation.Tests/Scout.Foundation.Tests.csproj --no-restore --filter "FullyQualifiedName!~ScoutApplicationTests&FullyQualifiedName!~ScoutApplicationRuntimeTests&FullyQualifiedName!~PinnedConfigurationTests"
          dotnet test tests/Scout.Differential.Tests/Scout.Differential.Tests.csproj --no-restore --filter "FullyQualifiedName~DifferentialCasePolicyTests|FullyQualifiedName~DifferentialOutputNormalizerTests"
      - name: Fuzz smoke
        shell: pwsh
        run: |
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- regex-parse
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- glob-compile
          dotnet run --project fuzz/Scout.Fuzz/Scout.Fuzz.csproj --no-build -- search-loop
      - name: Format
        run: dotnet format Scout.slnx --no-restore --verify-no-changes
      - name: Publish Native AOT static library
        shell: pwsh
        run: >
          dotnet publish src/Scout.App/Scout.App.csproj
          -r ${{ matrix.rid }}
          -c Release
          -p:NativeLib=Static
          -o artifacts/app/${{ matrix.rid }}

  native-linux:
    name: native Unix link (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    container:
      image: docker.io/library/debian:bookworm-slim@sha256:0104b334637a5f19aa9c983a91b54c89887c0984081f2068983107a6f6c21eeb
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
    steps:
      - name: Pinned snapshot apt prerequisites
        shell: sh
        run: |
          export DEBIAN_FRONTEND=noninteractive
          rm -f /etc/apt/sources.list.d/*.sources /etc/apt/sources.list.d/*.list
          printf 'deb %s bookworm main\n' "$LINUX_SNAPSHOT_URL" > /etc/apt/sources.list
          printf 'Acquire::Check-Valid-Until false;\nAcquire::Retries 3;\n' > /etc/apt/apt.conf.d/99snapshot
          apt-get update
          apt-get install -y --no-install-recommends \
            bash \
            binutils \
            bzip2 \
            brotli \
            build-essential \
            ca-certificates \
            clang \
            curl \
            git \
            gzip \
            libc6="$LINUX_LIBC_VERSION" \
            libc-bin="$LINUX_LIBC_VERSION" \
            libgssapi-krb5-2 \
            libicu72 \
            libssl3 \
            lz4 \
            ncompress \
            python3 \
            tar \
            unzip \
            xz-utils \
            zlib1g \
            zlib1g-dev \
            zstd
      - uses: actions/checkout@v6
      - name: Verify Linux prerequisites
        shell: sh
        run: eng/verify-linux-prereqs.sh ${{ matrix.rid }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Link native entry spike
        run: spike/build-unix.sh ${{ matrix.rid }}
      - name: Link native executable
        run: native/build-app-unix.sh ${{ matrix.rid }} --smoke-only

  native-macos:
    name: native Unix link (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-x64
            runner: macos-26-intel
          - rid: osx-arm64
            runner: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Link native entry spike
        run: spike/build-unix.sh ${{ matrix.rid }}
      - name: Link native executable
        run: native/build-app-unix.sh ${{ matrix.rid }} --smoke-only

  native-windows:
    name: native Windows link (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-2025-vs2026
            vsarch: amd64
          - rid: win-arm64
            runner: windows-11-arm
            vsarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Link native executable
        shell: cmd
        run: |
          for /f "usebackq tokens=* delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL (
            echo Visual Studio installation not found.
            exit /b 1
          )
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=${{ matrix.vsarch }}
          pwsh -NoProfile -ExecutionPolicy Bypass -File spike/build-windows.ps1 ${{ matrix.rid }}
          pwsh -NoProfile -ExecutionPolicy Bypass -File native/build-app-windows.ps1 ${{ matrix.rid }}

  release-gates:
    name: release gates dispatch
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: read
    needs:
      - portable-build-linux
      - linux-arm64-host
      - portable-build-host
      - native-linux
      - native-macos
      - native-windows
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled() && !failure() }}
    steps:
      - name: Dispatch Release Gates
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-gates.yml --repo "${{ github.repository }}" --ref main -f checkout_ref="${{ github.sha }}"
