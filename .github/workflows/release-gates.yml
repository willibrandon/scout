name: Release Gates

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: Commit SHA or ref to test. Defaults to the workflow ref.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.checkout_ref || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  full-tests:
    name: full pinned tests
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Build pinned ripgrep oracle
        run: eng/setup-ripgrep-oracle.sh
      - name: Restore
        run: dotnet restore Scout.slnx
      - name: Fetch pinned corpora
        run: eng/fetch-corpora.sh --all
      - name: Preflight
        run: eng/preflight.sh
      - name: Test
        run: dotnet test Scout.slnx --no-restore
      - name: Native pinned differentials
        run: native/build-app-unix.sh osx-arm64 --with-differentials

  performance-gate:
    name: hyperfine performance gate
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.sha }}
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.102
      - name: Build pinned ripgrep oracle
        run: eng/setup-ripgrep-oracle.sh
      - name: Install pinned hyperfine
        run: eng/setup-hyperfine.sh
      - name: Fetch pinned corpora
        run: eng/fetch-corpora.sh --all
      - name: Preflight
        run: eng/preflight.sh
      - name: Link native executable
        run: native/build-app-unix.sh osx-arm64 --with-differentials
      - name: Run hyperfine gates
        run: bench/run-hyperfine.sh --gate
